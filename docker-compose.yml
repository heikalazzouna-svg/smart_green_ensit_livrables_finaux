version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: smartgreen_db
    environment:
      POSTGRES_DB: smartgreen_ensit
      POSTGRES_USER: ensit_user
      POSTGRES_PASSWORD: ensit_pass_2026
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ensit_user -d smartgreen_ensit"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - smartgreen_net
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: smartgreen_backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://ensit_user:ensit_pass_2026@db:5432/smartgreen_ensit
      SECRET_KEY: change-me-in-production-2026-ensit-green-tech-challenge-secret
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
    volumes:
      - ./backend/app:/app/app
    ports:
      - "8000:8000"
    networks:
      - smartgreen_net
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: smartgreen_frontend
    depends_on:
      - backend
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - ./frontend/vite.config.ts:/app/vite.config.ts
    ports:
      - "3000:3000"
    environment:
      VITE_API_URL: http://backend:8000
    networks:
      - smartgreen_net
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: smartgreen_nginx
    depends_on:
      - frontend
      - backend
    ports:
      - "80:80"
    volumes:
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - smartgreen_net
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: smartgreen_pgadmin
    depends_on:
      - db
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@ensit.tn
      PGADMIN_DEFAULT_PASSWORD: Admin@2026
    ports:
      - "5050:80"
    networks:
      - smartgreen_net
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  smartgreen_net:
    driver: bridge
